<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ description }}" />
    <meta name="view-transition" content="same-origin">
    <meta name="generator" content="{{ eleventy.generator }}">

    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ page.url }}" />
    <meta property="og:image" content="https://koddsson.com/img/079a3c3546a8794a43ba155b1f1c2a6e-576w.jpeg" />
    <meta property="og:logo" content="/favicon.ico" />

    <link rel="webmention" href="https://webmention.io/koddsson.com/webmention">
    <link rel="pingback" href="https://webmention.io/koddsson.com/xmlrpc">
    <link rel="icon" href="/favicon.ico" />

    <title>{{ title }}</title>
    <meta property="og:title" content="{{ title }}" />

    <link rel="stylesheet" href="/css/open-props.min.css">
    <link rel="stylesheet" href="/css/normalize.min.css">
    <link rel="stylesheet" href="/css/prism-vs.css">
    <link rel="stylesheet" href="/css/index.css">

    <style>
      body {
        padding: var(--size-2) var(--size-3);
      }

      blockquote,
      header,
      p {
        margin-bottom: var(--size-3);
      }

      pre.highlight {
        background: var(--surface-2);
        border-radius: var(--radius-2);
        padding: var(--size-3);
        overflow: auto;
        max-inline-size: unset;
      }

      blockquote p {
        margin-bottom: 0;
      }

      .items {
        list-style: none;
        margin: 0;
        padding: 0;
        margin-bottom: var(--size-2);
      }

      .items > li {
        margin: 0;
        padding: 0;
      }

      .items > li > a {
        display: block;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "web-vitals": "/assets/web-vitals.js"
        }
      }
    </script>
    <script type="module">
      import "/js/toot-embed-element.js";
    </script>
    <script type="module">
      import {onLCP, onCLS, onINP, onFCP, onTTFB} from 'web-vitals';

      const endpoint = 'https://vitals.koddsson.workers.dev/';

      function sendToAnalytics(metric) {
        const body = JSON.stringify(metric);

        // Use `navigator.sendBeacon()` if available, falling back to `fetch()`.
        (navigator.sendBeacon && navigator.sendBeacon(endpoint, body)) ||
          fetch(endpoint, {body, method: 'POST', keepalive: true});
      }

      onCLS(sendToAnalytics);
      onLCP(sendToAnalytics);
      onINP(sendToAnalytics);
      onFCP(sendToAnalytics);
      onTTFB(sendToAnalytics);
    </script>
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to content</a>
    <header>
      {% if page.url != '/' %}<nav><a href="{% if page.url contains '/notes/' and page.url != '/notes/' %}/notes/{% elsif page.url contains '/posts/' and page.url != '/posts/' %}/posts/{% elsif page.url contains '/images/' and page.url != '/images/' %}/images/{% else %}/{% endif %}">&larr; Back</a></nav>{% endif %}
      {% if title %}<h1>{{ title }}</h1>{% endif %}
      {% if date %}<time datetime="{{ date | date: '%Y-%m-%d' }}">{{ date | date: '%B %d, %Y' }}</time
      >{% endif %}
    </header>
    <main id="main">{{ content }}</main>
    {% if date %}<section id="webmentions"></section>
    <script type="module" src="/js/webmentions.js"></script>{% endif %}
    <footer>
      <nav>
        <a href="/">Home</a>
        <a href="/posts/">Posts</a>
        <a href="/notes/">Notes</a>
        <a href="/images/">Images</a>
      </nav>
    </footer>
    <script data-goatcounter="https://koddsson.goatcounter.com/count"
            async src="https://gc.zgo.at/count.js"></script>
  </body>
</html>
